<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayBuilder Manager</title>
<link rel="stylesheet" href="css/manager.css">
</head>
<body>
<div class="title-bar">
  <span class="title-bar-left">☀ DayBuilder Manager</span>
  <span class="title-bar-right">
    <span id="manager-name"></span>
    <button class="btn btn-danger btn-sm" id="btn-close" title="Shutdown">✕</button>
  </span>
</div>
<div class="app-container">
  <nav class="sidebar">
    <div class="nav-items">
      <a class="nav-item active" data-view="dashboard">Dashboard</a>
      <a class="nav-item" data-view="employees">Employees</a>
      <a class="nav-item" data-view="devices">Devices</a>
      <a class="nav-item" data-view="activities">Activities</a>
      <a class="nav-item" data-view="reports">Reports</a>
      <a class="nav-item" data-view="settings">Settings</a>
    </div>
    <div class="sidebar-status">
      <div class="text-muted">Last Import</div>
      <div id="import-status">—</div>
    </div>
  </nav>
  <main class="content" id="content"></main>
</div>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/employee.js"></script>
<script src="js/devices.js"></script>
<script src="js/activities.js"></script>
</body>
</html>
