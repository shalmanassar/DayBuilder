<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayBuilder</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="status-banner" id="offlineBanner">⚠ Offline mode — some features unavailable</div>

  <header>
    <h1 id="dateTitle">☀ Loading...</h1>
    <div class="controls">
      <button id="btnSettings" title="Settings">⚙</button>
      <button id="btnClipboard" title="Copy report">📋</button>
    </div>
  </header>

  <main>
    <div class="timeline" id="timeline">
      <div class="timeline-empty">No blocks yet. Add an activity to start building your day.</div>
    </div>
    <button class="add-btn" id="btnAdd">+ Add Activity</button>
  </main>

  <footer>
    <span id="daySummary">TOT: 0h | Prod: 0h</span>
    <button class="post-btn" id="btnPost">POST TO LOG</button>
  </footer>

  <script src="js/timeline.js"></script>
  <script src="js/guided.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
