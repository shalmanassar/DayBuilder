<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayBuilder</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="title-bar">
    <span class="title-bar-left">RAD RMA Productivity Tracking Utility</span>
    <span class="title-bar-right"><span id="titleBarUser">USER: —</span> <button id="titleBarExit" title="Exit App" style="margin-left:1rem;background:none;border:1px solid var(--border);color:var(--danger);padding:0.1rem 0.5rem;border-radius:4px;cursor:pointer;font-size:0.75rem">✕ Exit</button></span>
  </div>

  <div class="status-banner" id="offlineBanner">⚠ Offline mode — some features unavailable</div>

  <header>
    <div class="date-nav">
      <button id="btnPrev" title="Previous day">◀</button>
      <h1 id="dateTitle">☀ Loading...</h1>
      <button id="btnNext" title="Next day">▶</button>
      <input type="date" id="datePicker" title="Pick a date">
    </div>
    <div class="controls">
      <button id="btnToday" title="Go to today">Today</button>
      <button id="btnWeekReport" title="Weekly report">📊 Week</button>
      <button id="btnSettings" title="Settings">⚙</button>
      <button id="btnClipboard" title="Copy report">⧉</button>
    </div>
  </header>

  <div class="calendar-accordion" id="calendarAccordion">
    <button class="calendar-toggle" id="calendarToggle">▸ Calendar</button>
    <div class="calendar-body" id="calendarBody"></div>
  </div>

  <main>
    <div class="timeline" id="timeline">
      <div class="timeline-empty">No blocks yet. Add an activity to start building your day.</div>
    </div>
    <button class="add-btn" id="btnAdd">+ Add Activity</button>
  </main>

  <footer>
    <span id="daySummary">TOT: 0h | Prod: 0h</span>
    <div>
      <button class="post-btn" id="btnSave" style="background:var(--accent)">Save</button>
      <button class="post-btn" id="btnPost" style="background:var(--success)">Submit to Mgr</button>
      <button class="post-btn" id="btnReport" style="background:var(--bg-surface)">Report</button>
      <button class="post-btn" id="btnOpenTarget" style="background:var(--bg-surface)">Open Target</button>
    </div>
  </footer>

  <div id="validationContainer"></div>

  <script src="js/timeline.js"></script>
  <script src="js/guided.js"></script>
  <script src="js/post.js"></script>
  <script src="js/report.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
